    <script>
        const State = {
            mode: 'android', file: null, url: null, originalDate: null, duration: 0,
            startTime: 0, endTime: 0, coverTime: 0, uuid: null, imageBlob: null,
            muteAudio: false, spoofDevice: 'Apple',
            reset() {
                if (this.url) URL.revokeObjectURL(this.url);
                this.file = null; this.url = null; this.imageBlob = null;
                this.uuid = crypto.randomUUID().toUpperCase();
                this.originalDate = new Date();
            }
        };

        let isDragging = null, autoScrollRaf = null, scrollSpeed = 0;
        let isPlaying = false, loopAnimationFrame = null, filmstripGenerationId = 0; 
        let isSeeking = false, pendingSeekTime = null;

        const videoUpload = document.getElementById('videoUpload');
        const uploadLabel = document.getElementById('upload-label');
        const videoPreview = document.getElementById('videoPreview');
        const playBtn = document.getElementById('playBtn');
        const editorPanel = document.getElementById('editorPanel');
        const processBtn = document.getElementById('processBtn');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const timeline = document.getElementById('timeline');
        const timelineWrapper = document.getElementById('timelineWrapper');
        const thumbnailsContainer = document.getElementById('thumbnails');

        function setMode(mode) {
            State.mode = mode;
            document.getElementById('android-toggle').classList.toggle('active', mode === 'android');
            document.getElementById('ios-toggle').classList.toggle('active', mode === 'ios');
        }

        function updateLog(msg, type = "info") { 
            const el = document.getElementById('logText');
            el.innerHTML = msg; el.className = `log-text ${type}`;
        }

        uploadLabel.addEventListener('dragover', e => { e.preventDefault(); uploadLabel.classList.add('dragover'); });
        uploadLabel.addEventListener('dragleave', () => uploadLabel.classList.remove('dragover'));
        uploadLabel.addEventListener('drop', e => {
            e.preventDefault(); uploadLabel.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        videoUpload.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

        function handleFile(file) {
            if (!file || !file.type.startsWith('video/')) return updateLog("Please select a valid video.", "error");
            State.reset();
            State.file = file;
            State.originalDate = new Date(file.lastModified || Date.now()); 
            State.url = URL.createObjectURL(file);
            videoPreview.src = State.url;
            
            document.getElementById('videoContainer').classList.remove('hidden');
            editorPanel.classList.remove('hidden');
            processBtn.classList.remove('hidden');
            updateLog("");
            
            if (isPlaying) togglePlay(); 

            videoPreview.onloadedmetadata = () => {
                State.duration = videoPreview.duration;
                State.startTime = 0; State.endTime = State.duration; State.coverTime = Math.min(0.5, State.duration / 2);
                timeline.style.width = '100%'; timelineWrapper.scrollLeft = 0;
                updateUI(); 
                requestSeek(State.coverTime); 
                generateThumbnails();
            };
        }

        async function generateThumbnails() {
            const genId = ++filmstripGenerationId; 
            const containerWidth = timeline.offsetWidth;
            const numThumbs = Math.max(8, Math.floor(containerWidth / 45)); 
            
            thumbnailsContainer.innerHTML = '';
            
            const hiddenVid = document.createElement('video');
            hiddenVid.muted = true; hiddenVid.playsInline = true; 
            hiddenVid.src = State.url; hiddenVid.style.display = 'none';
            document.body.appendChild(hiddenVid);
            
            await new Promise(r => {
                if (hiddenVid.readyState >= 2) r();
                else hiddenVid.addEventListener('loadeddata', r, { once: true });
            });
            
            if (filmstripGenerationId !== genId) { document.body.removeChild(hiddenVid); return; }

            const step = State.duration / numThumbs;
            const c = document.createElement('canvas');
            c.width = hiddenVid.videoWidth / 5; c.height = hiddenVid.videoHeight / 5;
            const ctx = c.getContext('2d');
            
            for (let i = 0; i < numThumbs; i++) {
                if (filmstripGenerationId !== genId) break;
                
                hiddenVid.currentTime = i * step + (step/2);
                await new Promise(r => { 
                    const finish = () => { hiddenVid.removeEventListener('seeked', finish); r(); };
                    hiddenVid.addEventListener('seeked', finish);
                    setTimeout(finish, 400); 
                });
                
                if (filmstripGenerationId !== genId) break;

                ctx.drawImage(hiddenVid, 0, 0, c.width, c.height);
                const img = document.createElement('img');
                img.src = c.toDataURL('image/jpeg', 0.5);
                img.onload = () => img.style.opacity = '1'; 
                thumbnailsContainer.appendChild(img);
            }
            
            document.body.removeChild(hiddenVid);
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playBtn.innerText = "⏸"; videoPreview.currentTime = State.startTime; videoPreview.play(); loopPreview();
            } else {
                playBtn.innerText = "▶"; videoPreview.pause(); cancelAnimationFrame(loopAnimationFrame); requestSeek(State.coverTime);
            }
        }
        function loopPreview() {
            if (!isPlaying) return;
            if (videoPreview.currentTime >= State.endTime - 0.05) videoPreview.currentTime = State.startTime;
            loopAnimationFrame = requestAnimationFrame(loopPreview);
        }

        function onPointerDown(e, handle) {
            e.preventDefault(); if (isPlaying) togglePlay();
            isDragging = handle; document.body.classList.add('dragging'); e.target.setPointerCapture(e.pointerId); 
        }
        document.getElementById('handleLeft').addEventListener('pointerdown', e => onPointerDown(e, 'left'));
        document.getElementById('handleRight').addEventListener('pointerdown', e => onPointerDown(e, 'right'));
        document.getElementById('handleCover').addEventListener('pointerdown', e => onPointerDown(e, 'cover'));

        window.addEventListener('pointermove', e => {
            if (!isDragging) return;
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const wrapperRect = timelineWrapper.getBoundingClientRect();
            if (clientX < wrapperRect.left) scrollSpeed = (clientX - wrapperRect.left) * 0.15;
            else if (clientX > wrapperRect.right) scrollSpeed = (clientX - wrapperRect.right) * 0.15;
            else scrollSpeed = 0;
            if (scrollSpeed !== 0 && !autoScrollRaf) startAutoScroll(clientX);
            else updateTimeFromX(clientX);
        });

        window.addEventListener('pointerup', e => {
            if (!isDragging) return;
            if (e.target.releasePointerCapture) e.target.releasePointerCapture(e.pointerId);
            document.body.classList.remove('dragging'); scrollSpeed = 0; 
            if (autoScrollRaf) { cancelAnimationFrame(autoScrollRaf); autoScrollRaf = null; }
            isDragging = null;
        });

        function startAutoScroll(clientX) {
            const scrollLoop = () => {
                if (!isDragging || scrollSpeed === 0) { autoScrollRaf = null; return; }
                timelineWrapper.scrollLeft += scrollSpeed; updateTimeFromX(clientX);
                autoScrollRaf = requestAnimationFrame(scrollLoop);
            };
            autoScrollRaf = requestAnimationFrame(scrollLoop);
        }

        function updateTimeFromX(clientX) {
            const rect = timeline.getBoundingClientRect(); 
            let ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            let time = ratio * State.duration;
            const minTrim = State.duration * (38 / timeline.offsetWidth); 

            if (isDragging === 'left') {
                State.startTime = Math.max(0, Math.min(time, State.endTime - minTrim));
                if (State.coverTime < State.startTime) State.coverTime = State.startTime;
                requestSeek(State.startTime);
            } else if (isDragging === 'right') {
                State.endTime = Math.max(State.startTime + minTrim, Math.min(time, State.duration));
                if (State.coverTime > State.endTime) State.coverTime = State.endTime;
                requestSeek(State.endTime);
            } else if (isDragging === 'cover') {
                State.coverTime = Math.max(State.startTime, Math.min(time, State.endTime));
                requestSeek(State.coverTime);
            }
            updateUI();
        }

        function requestSeek(time) {
            if (!isSeeking) {
                isSeeking = true;
                videoPreview.currentTime = time;
            } else {
                pendingSeekTime = time;
            }
        }

        videoPreview.addEventListener('seeked', () => {
            isSeeking = false;
            if (pendingSeekTime !== null) {
                const t = pendingSeekTime; pendingSeekTime = null; requestSeek(t);
            } else if (!isDragging && !isPlaying && Math.abs(videoPreview.currentTime - State.coverTime) < 0.1) {
                hiddenCanvas.width = videoPreview.videoWidth; hiddenCanvas.height = videoPreview.videoHeight;
                hiddenCanvas.getContext('2d').drawImage(videoPreview, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                hiddenCanvas.toBlob(blob => { State.imageBlob = blob; }, 'image/jpeg', 0.95);
            }
        });

        function updateUI() {
            const pStart = (State.startTime / State.duration) * 100;
            const pEnd = (State.endTime / State.duration) * 100;
            const pCover = (State.coverTime / State.duration) * 100;
            document.getElementById('handleCover').style.left = `${pCover}%`;
            document.getElementById('trimBox').style.left = `${pStart}%`;
            document.getElementById('trimBox').style.width = `${pEnd - pStart}%`;
            document.getElementById('dimLeft').style.width = `${pStart}%`;
            document.getElementById('dimRight').style.width = `${100 - pEnd}%`;
            document.getElementById('coverText').innerHTML = `Cover <span>${State.coverTime.toFixed(1)}s</span>`;
            document.getElementById('trimText').innerHTML = (State.startTime > 0.1 || State.endTime < State.duration - 0.1) ? 
                `Trim <span>${(State.endTime - State.startTime).toFixed(1)}s</span>` : `Trim <span>Full</span>`;
        }

        function buildAppleMakerNote(uuid) {
            const maker = new Uint8Array(75);
            maker.set([65, 112, 112, 108, 101, 32, 105, 79, 83, 0, 0, 1], 0); // "Apple iOS\0\0\x01"
            maker.set([77, 77, 0, 42, 0, 0, 0, 8], 12); // Endianness MM, TIFF Magic
            maker.set([0, 1], 20); // 1 Entry
            maker.set([0, 17, 0, 2, 0, 0, 0, 37, 0, 0, 0, 26], 22); // Tag 0x0011 (Asset ID), Type ASCII, Length 37, Offset 26
            maker.set([0, 0, 0, 0], 34); // Next IFD
            maker.set(new TextEncoder().encode(uuid), 38);
            maker[74] = 0; // Null terminator
            return maker;
        }

        function buildQuickTimeMetaBox(uuid) {

            const keyBytes = new TextEncoder().encode("com.apple.quicktime.content.identifier");

            const dataBox = new Uint8Array(16 + uuidBytes.length);

            viewData.setUint32(8, 1); // type UTF-8

            viewKeys.setUint32(12, 1); 
            keysBox.set(mdtaBox, 16);

            const hdlrBox = new Uint8Array(33);

            hdlrBox.set(new TextEncoder().encode('mdir'), 16); hdlrBox.set(new TextEncoder().encode('appl'), 20);

            let offset = 12;
            metaBox.set(hdlrBox, offset); offset += hdlrBox.length;
            metaBox.set(keysBox, offset); offset += keysBox.length;
            metaBox.set(ilstBox, offset);

            const udtaBox = new Uint8Array(8 + metaBox.length);
            new DataView(udtaBox.buffer).setUint32(0, udtaBox.length); udtaBox.set(new TextEncoder().encode('udta'), 4);
            udtaBox.set(metaBox, 8);

            return udtaBox;
        }

        function injectAppleVideoMetadata(mp4Buffer, uuid) {
            const arr = new Uint8Array(mp4Buffer);
            const view = new DataView(mp4Buffer);
            let offset = 0, moovStart = -1, moovSize = 0, ftypStart = -1;

            while (offset < arr.length) {
                const size = view.getUint32(offset);
                const type = String.fromCharCode(arr[offset+4], arr[offset+5], arr[offset+6], arr[offset+7]);
                if (type === 'ftyp') ftypStart = offset;
                if (type === 'moov') { moovStart = offset; moovSize = size; break; }
                offset += size;
            }

            if (ftypStart !== -1) arr.set(new TextEncoder().encode('qt  '), ftypStart + 8); // Change to QuickTime

            // Insert UDTA to the END of the moov box (Works safely if muxer wrote moov at the end of the file)
            const udtaBox = buildQuickTimeMetaBox(uuid);
            const before = new Uint8Array(mp4Buffer, 0, moovStart + moovSize);
            const after = new Uint8Array(mp4Buffer, moovStart + moovSize);
            const newBuffer = new Uint8Array(before.length + udtaBox.length + after.length);
            
            newBuffer.set(before, 0);
            newBuffer.set(udtaBox, before.length);
            newBuffer.set(after, before.length + udtaBox.length);
            new DataView(newBuffer.buffer).setUint32(moovStart, moovSize + udtaBox.length);

            return newBuffer;
        }

        // ==========================================
        // LIGHTNING-FAST WEBCODECS ENGINE
        // ==========================================
        async function processVideoNative() {
            if (!window.VideoEncoder) return updateLog("WebCodecs unsupported. Use Chrome/Safari.", "error");
            if (isPlaying) togglePlay();
            if (!State.file || !State.imageBlob) {
                requestSeek(State.coverTime); return updateLog("Extracting cover frame...", "error");
            }
            
            processBtn.disabled = true;
            document.getElementById('progressFill').style.width = "5%";
            updateLog("");

            try {
                let finalVideoBuffer;
                document.getElementById('btnText').innerText = "Initializing Fast Engine...";

                let processVid = document.createElement('video');
                processVid.src = State.url; processVid.muted = true; processVid.playsInline = true; 
                processVid.style.position = 'fixed'; processVid.style.opacity = '0'; 
                document.body.appendChild(processVid);
                processVid.load();

                await new Promise((res, rej) => { 
                    if (processVid.readyState >= 1) res(); else { processVid.onloadedmetadata = res; processVid.onerror = rej; }
                });
                
                let outW = processVid.videoWidth; let outH = processVid.videoHeight;
                if (outW > 1920 || outH > 1920) { const r = Math.min(1920/outW, 1920/outH); outW = Math.round(outW*r); outH = Math.round(outH*r); }
                outW -= outW % 2; outH -= outH % 2; 

                hiddenCanvas.width = outW; hiddenCanvas.height = outH;
                const ctx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

                const AUDIO_SR = 44100;
                let audioDataToEncode = null; let extractedChannels = 2;

                if (!State.muteAudio) {
                    document.getElementById('btnText').innerText = "Processing Audio...";
                    try {
                        const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
                        const audioCtx = new OfflineCtx(2, AUDIO_SR, AUDIO_SR); 
                        const fileBuffer = await State.file.arrayBuffer();
                        const decodedBuffer = await new Promise((res, rej) => audioCtx.decodeAudioData(fileBuffer, res, rej));
                        
                        const trimDuration = State.endTime - State.startTime;
                        const renderCtx = new OfflineCtx(2, Math.ceil(AUDIO_SR * trimDuration), AUDIO_SR);
                        const source = renderCtx.createBufferSource();
                        source.buffer = decodedBuffer; source.connect(renderCtx.destination);
                        source.start(0, State.startTime, trimDuration);
                        
                        audioDataToEncode = await renderCtx.startRendering();
                        extractedChannels = audioDataToEncode.numberOfChannels;
                    } catch(e) { console.warn("No audio track detected."); }
                }

                // IMPORTANT: Do NOT use fastStart for iOS processing, so moov is safely written at the end
                let muxer = new Mp4Muxer.Muxer({
                    target: new Mp4Muxer.ArrayBufferTarget(),
                    video: { codec: 'avc', width: outW, height: outH },
                    audio: { codec: 'aac', numberOfChannels: audioDataToEncode ? extractedChannels : 2, sampleRate: AUDIO_SR }
                });

                const audioEncoder = new AudioEncoder({ output: (chunk, meta) => muxer.addAudioChunk(chunk, meta), error: console.warn });
                audioEncoder.configure({ codec: 'mp4a.40.2', sampleRate: AUDIO_SR, numberOfChannels: audioDataToEncode ? extractedChannels : 2, bitrate: 128000 });

                // Fill Audio: Either real extracted audio, or explicit SILENCE (fixes Android parsing errors)
                const totalAudioFrames = Math.ceil(AUDIO_SR * (State.endTime - State.startTime));
                const frameSize = 1024;
                for (let i = 0; i < totalAudioFrames; i += frameSize) {
                    const size = Math.min(frameSize, totalAudioFrames - i);
                    const planarData = new Float32Array((audioDataToEncode ? extractedChannels : 2) * size);
                    if (audioDataToEncode) {
                        for (let c = 0; c < extractedChannels; c++) planarData.set(audioDataToEncode.getChannelData(c).subarray(i, i + size), c * size);
                    } // else it remains full of zeros (silence)
                    const ad = new AudioData({ format: 'f32-planar', sampleRate: AUDIO_SR, numberOfFrames: size, numberOfChannels: audioDataToEncode ? extractedChannels : 2, timestamp: (i / AUDIO_SR) * 1e6, data: planarData });
                    audioEncoder.encode(ad); ad.close();
                }
                await audioEncoder.flush(); audioEncoder.close();

                document.getElementById('btnText').innerText = "Fast Rendering Video...";
                const videoEncoder = new VideoEncoder({ output: (chunk, meta) => muxer.addVideoChunk(chunk, meta), error: console.error });
                videoEncoder.configure({ codec: 'avc1.4d002a', width: outW, height: outH, hardwareAcceleration: 'prefer-hardware', bitrate: (outW * outH) > 2000000 ? 8000000 : 5000000 });

                let frameCount = 0; let lastMediaTime = -1;
                await new Promise((resolve) => {
                    const captureFrame = (now, metadata) => {
                        const currentMediaTime = metadata ? metadata.mediaTime : processVid.currentTime;
                        if (currentMediaTime >= State.endTime) { processVid.pause(); resolve(); return; }
                        
                        if (currentMediaTime !== lastMediaTime) {
                            lastMediaTime = currentMediaTime;
                            ctx.drawImage(processVid, 0, 0, outW, outH);
                            const frame = new VideoFrame(hiddenCanvas, { timestamp: Math.max(0, (currentMediaTime - State.startTime)) * 1e6 });
                            videoEncoder.encode(frame, { keyFrame: frameCount === 0 });
                            frame.close(); frameCount++;
                            
                            if (frameCount % 4 === 0) {
                                const p = Math.min(95, 5 + Math.round(((currentMediaTime - State.startTime) / (State.endTime - State.startTime)) * 90));
                                document.getElementById('progressFill').style.width = `${p}%`; document.getElementById('btnText').innerText = `Encoding Native... ${p}%`;
                            }
                        }
                        if ('requestVideoFrameCallback' in processVid) processVid.requestVideoFrameCallback(captureFrame); else requestAnimationFrame(captureFrame);
                    };

                    processVid.currentTime = State.startTime;
                    processVid.playbackRate = 2.5; // High-speed linear playback fixes mobile seek lag
                    processVid.play().then(() => {
                        if ('requestVideoFrameCallback' in processVid) processVid.requestVideoFrameCallback(captureFrame); else requestAnimationFrame(captureFrame);
                    });
                });

                await videoEncoder.flush(); videoEncoder.close(); muxer.finalize();
                document.body.removeChild(processVid);

                finalVideoBuffer = muxer.target.buffer;

                if (State.mode === 'ios') finalVideoBuffer = injectAppleVideoMetadata(finalVideoBuffer, State.uuid);

                document.getElementById('btnText').innerText = "Applying Metadata...";
                document.getElementById('progressFill').style.width = "95%";

                const imageBytes = await applyEXIFData();
                if (State.mode === 'android') await createAndroidUniversal(finalVideoBuffer, imageBytes);
                else await createIOSBundle(finalVideoBuffer, imageBytes);
                
            } catch (err) {
                console.error(err); updateLog("Error: " + err.message, "error");
            } finally {
                processBtn.disabled = false; document.getElementById('btnText').innerText = "Create Live Photo";
                document.getElementById('progressFill').style.width = "0%"; requestSeek(State.coverTime);
            }
        }

        // ==========================================
        // EXIF & METADATA BUNDLING
        // ==========================================
        async function applyEXIFData() {
            const reader = new FileReader(); reader.readAsDataURL(State.imageBlob);
            await new Promise(r => reader.onload = r);
            let jpegData = reader.result;

            let exifObj = {"0th": {}, "Exif": {}};
            try { exifObj = piexif.load(jpegData); } catch(e) {}

            const pad = n => String(n).padStart(2, '0'); const d = State.originalDate;
            const dateStr = `${d.getFullYear()}:${pad(d.getMonth()+1)}:${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;

            exifObj["0th"][piexif.ImageIFD.DateTime] = dateStr; exifObj["Exif"][piexif.ExifIFD.DateTimeOriginal] = dateStr;
            const devMap = { 'Apple': { make: 'Apple', model: 'iPhone 15 Pro' }, 'Samsung': { make: 'samsung', model: 'SM-S928U' }, 'Google': { make: 'Google', model: 'Pixel 8 Pro' } };
            exifObj["0th"][piexif.ImageIFD.Make] = devMap[State.spoofDevice].make; exifObj["0th"][piexif.ImageIFD.Model] = devMap[State.spoofDevice].model;

            if (State.mode === 'ios') {
                const makerNoteBytes = buildAppleMakerNote(State.uuid);
                let makerNoteStr = ""; for(let i=0; i<makerNoteBytes.length; i++) makerNoteStr += String.fromCharCode(makerNoteBytes[i]);
                exifObj["Exif"][piexif.ExifIFD.MakerNote] = makerNoteStr;
            }

            const newJpegBase64 = piexif.insert(piexif.dump(exifObj), jpegData);
            const byteString = atob(newJpegBase64.split(',')[1]);
            const ia = new Uint8Array(byteString.length); for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            return ia;
        }

        async function createAndroidUniversal(videoArrayBuffer, imageBytes) {
            const videoLength = videoArrayBuffer.byteLength;
            const presentationTimeUs = Math.max(0, Math.round((State.coverTime - State.startTime) * 1000000));

            const xmpData = `<?xpacket begin="" id="W5M0MpCehiHzreSzNTczkc9d"?><x:xmpmeta xmlns:x="adobe:ns:meta/" x:xmptk="Adobe XMP Core 5.1.0-jc003"><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"><rdf:Description rdf:about="" xmlns:Container="http://ns.google.com/photos/1.0/container/" xmlns:Item="http://ns.google.com/photos/1.0/container/item/" xmlns:GCamera="http://ns.google.com/photos/1.0/camera/" xmlns:xiaomi="http://ns.xiaomi.com/photos/1.0/camera/" GCamera:MotionPhoto="1" GCamera:MotionPhotoVersion="1" GCamera:MotionPhotoPresentationTimestampUs="${presentationTimeUs}" GCamera:MicroVideo="1" GCamera:MicroVideoVersion="1" GCamera:MicroVideoOffset="${videoLength}" GCamera:MicroVideoPresentationTimestampUs="${presentationTimeUs}" xiaomi:MicroVideo="1" xiaomi:MicroVideoVersion="1"><Container:Directory><rdf:Seq><rdf:li rdf:parseType="Resource"><Container:Item Item:Semantic="Primary" Item:Mime="image/jpeg" Item:Length="0"/></rdf:li><rdf:li rdf:parseType="Resource"><Container:Item Item:Mime="video/mp4" Item:Semantic="MotionPhoto" Item:Length="${videoLength}" Item:Padding="0"/></rdf:li></rdf:Seq></Container:Directory></rdf:Description></rdf:RDF></x:xmpmeta><?xpacket end="w"?>`;

            const xmpBuffer = new TextEncoder().encode(xmpData);
            const namespace = new TextEncoder().encode("http://ns.adobe.com/xap/1.0/\0");
            const app1Header = new Uint8Array([0xFF, 0xE1, ((namespace.length + xmpBuffer.length + 2) >> 8) & 0xFF, (namespace.length + xmpBuffer.length + 2) & 0xFF]);
            
            const app1Segment = new Uint8Array(app1Header.length + namespace.length + xmpBuffer.length);
            app1Segment.set(app1Header, 0); app1Segment.set(namespace, app1Header.length); app1Segment.set(xmpBuffer, app1Header.length + namespace.length);

            let insertPos = 2; 
            if (imageBytes[insertPos] === 0xFF && imageBytes[insertPos+1] === 0xE0) insertPos += 2 + ((imageBytes[insertPos+2] << 8) | imageBytes[insertPos+3]);

            // Fix Google Photos Padding crash (Requires exact Even boundaries)
            let jpegLen = insertPos + app1Segment.length + (imageBytes.length - insertPos);
            let padding = (jpegLen % 2 !== 0) ? 1 : 0;

            const finalBuffer = new Uint8Array(jpegLen + padding + videoLength);
            finalBuffer.set(imageBytes.subarray(0, insertPos), 0);
            finalBuffer.set(app1Segment, insertPos);
            finalBuffer.set(imageBytes.subarray(insertPos), insertPos + app1Segment.length);
            if (padding) finalBuffer[jpegLen] = 0x00;
            finalBuffer.set(new Uint8Array(videoArrayBuffer), jpegLen + padding);

            triggerDownload(new Blob([finalBuffer], { type: 'image/jpeg' }), `MotionPhoto_${Date.now()}.jpg`);
            updateLog("✅ Motion Photo Created Successfully!");
        }

        async function createIOSBundle(videoArrayBuffer, imageBytes) {
            const finalImageBlob = new Blob([imageBytes], { type: 'image/jpeg' });
            const baseName = `IMG_${Math.floor(Math.random() * 9000) + 1000}`;
            
            const jpgFile = new File([finalImageBlob], `${baseName}.JPG`, { type: "image/jpeg" });
            const movFile = new File([videoArrayBuffer], `${baseName}.MOV`, { type: "video/quicktime" }); // Must be .MOV

            if (navigator.canShare && navigator.canShare({ files: [jpgFile, movFile] })) {
                try { await navigator.share({ title: 'Save Live Photo', files: [jpgFile, movFile] }); updateLog("✅ Live Photo Shared! Save to Photos."); return; } catch (err) { fallbackZipDownload(jpgFile, movFile); }
            } else fallbackZipDownload(jpgFile, movFile);
        }

        async function fallbackZipDownload(jpg, mov) {
            updateLog("Bundling format safely...");
            try {
                const zip = new JSZip(); zip.file(jpg.name, jpg); zip.file(mov.name, mov);
                const content = await zip.generateAsync({ type: "blob", compression: "STORE" });
                triggerDownload(content, "LivePhoto_Bundle.zip"); updateLog("✅ Zip saved. Airdrop to iPhone or extract into Photos.");
            } catch (err) {
                updateLog("Files ready! Please tap both to save:", "info");
                const logEl = document.getElementById('logText'); logEl.innerHTML = "";
                const b1 = document.createElement('button'); b1.innerText = "1. Save Photo 💾"; b1.style.cssText = "padding:10px 16px; border-radius:8px; border:none; background:var(--accent-ios); color:white; font-weight:bold; cursor:pointer; margin:4px;"; b1.onclick = () => triggerDownload(jpg, jpg.name);
                const b2 = document.createElement('button'); b2.innerText = "2. Save Video 🎥"; b2.style.cssText = b1.style.cssText; b2.onclick = () => triggerDownload(mov, mov.name);
                logEl.appendChild(b1); logEl.appendChild(b2);
            }
        }

        function triggerDownload(blob, filename) {
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
    </script>
